name: Fetch Elon Tweets

on:
  schedule:
    - cron: '*/15 * * * *'   # 每 15 分鐘執行一次
  workflow_dispatch:           # 允許手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 需要寫入權限來 commit 資料

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch tweets
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: node scripts/fetch.js

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 只有在資料有變動時才 commit
          git diff --staged --quiet || git commit -m "chore: update tweets $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
