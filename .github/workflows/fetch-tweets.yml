name: Fetch Elon Tweets

on:
  schedule:
    - cron: '*/20 * * * *'   # 每 20 分鐘（XTracker 免費無限制；GitHub 排程本身可能延遲幾分鐘）
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch tweets from XTracker
        run: node scripts/fetch.js

      - name: Check entry signal & log price
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/signal.js

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update tweets $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
