name: Fetch Elon Tweets

on:
  schedule:
    # 用冷門分鐘（:07 :27 :47）而唔用 :00 :20 :40——GitHub 免費排程會 drop 擠塞時刻嘅觸發，
    # 錯開後實際 fire 率高好多。頁面本身仲有直連 xtracker 兜底，唔靠呢個 cron 都有即時資料。
    - cron: '7,27,47 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch tweets from XTracker
        run: node scripts/fetch.js

      - name: Check entry signal & log price
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/signal.js

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update tweets $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
